[service.server]
profiles = ["private", "pop", "public", "plaintext"]
require = [
  { if.profile = "public", then = { resource = "public-server-data" }, or_else = { if.profile = "plaintext", then = { resource = "plaintext-server-data" }, or_else = { resource = "private-server-data" } } },
]
sh = '''
rm -f /tmp/chatt-server.kvlog
cargo run $CARGO_FLAGS -p server -- --logfile /tmp/chatt-server.kvlog serve $CHATT_SERVER_CONFIG
'''
env.CHATT_RUN_DIR = { if.profile = "public", then = "/tmp/public-dev-chatt-server/", or_else = { if.profile = "plaintext", then = "/tmp/plaintext-dev-chatt-server/", or_else = "/tmp/private-dev-chatt-server/" } }
env.CHATT_SERVER_CONFIG = { if.profile = "public", then = "dev/public-server.toml", or_else = { if.profile = "plaintext", then = "dev/plaintext-server.toml", or_else = "dev/private-server.toml" } }
env.CARGO_FLAGS = { if.profile = "pop", then = "--release", or_else = "" }
env.CHATT_AUDIO_POP_LOG = { if.profile = "pop", then = "1", or_else = "0" }
ready.when.output_contains = "chatt server listening"
allow_multiple = "distinct_profiles"
ready.timeout = 10.0
info = "Local chatt development server"

[action.alice]
profiles = ["default", "pop"]
require = ["server"]
managed = false
allow_multiple = true
cli.forward_arguments = true
env.CHATT_RUN_DIR = "/tmp/chatt-dev/alice"
env.CARGO_FLAGS = { if.profile = "pop", then = "--release", or_else = "" }
env.CHATT_AUDIO_POP_LOG = { if.profile = "pop", then = "1", or_else = "0" }
env.CHATT_AUDIO_CALLBACK_LOG = { if.profile = "pop", then = "1", or_else = "0" }
env.CHATT_AUDIO_PLAYBACK_WAV = { if.profile = "pop", then = "/tmp/chatt-alice-playback.wav", or_else = "" }
sh = '''
if [ "$#" -gt 0 ]; then
  cargo run $CARGO_FLAGS -p chatt -- --config dev/chatt-alice.toml "$@"
else
  rm -f /tmp/chatt-alice.kvlog
  cargo run $CARGO_FLAGS -p chatt -- --config dev/chatt-alice.toml --logfile /tmp/chatt-alice.kvlog
fi
'''
info = "Run the Alice client; trailing args run a chatt subcommand against it"

