[service.server]
sh = '''
rm /tmp/chatt-server.kvlog
test -f chatt-server.toml || cargo run -p server -- init-config chatt-server.toml
cargo run -p server -- --logfile /tmp/chatt-server.kvlog serve chatt-server.toml
'''
ready.when.output_contains = "chatt server listening"
ready.timeout = 10.0
info = "Local chatt development server"

[action.client-alice]
sh = '''
rm /tmp/chatt-alice.kvlog
cargo run -p chatt -- --config dev/chatt-alice.toml --logfile /tmp/chatt-alice.kvlog
'''
require = ["server"]
managed = false
env.CHATT_RUN_DIR = "/tmp/chatt-dev/alice"
info = "Run the Alice client in this terminal"

[action.client-bob]
sh = '''
rm /tmp/chatt-bob.kvlog
cargo run -p chatt -- --config dev/chatt-bob.toml --logfile /tmp/chatt-bob.kvlog
'''
require = ["server"]
managed = false
env.CHATT_RUN_DIR = "/tmp/chatt-dev/bob"
info = "Run the Bob client in this terminal"

[action.json-snapshot-client-logs]
sh = '''
kvlog /tmp/chatt-server.kvlog --json > /tmp/chatt-server.json
kvlog /tmp/chatt-soundboard.kvlog --json > /tmp/chatt-soundboard.json
kvlog /tmp/chatt-alice.kvlog --json > /tmp/chatt-alice.json
'''

[service.audio-pop-server]
sh = '''
rm -f /tmp/chatt-server.kvlog /tmp/chatt-server.json
test -f chatt-server.toml || cargo run --release -p server -- init-config chatt-server.toml
cargo run --release -p server -- --logfile /tmp/chatt-server.kvlog serve chatt-server.toml
'''
ready.when.output_contains = "chatt server listening"
ready.timeout = 10.0
cache.never = true
env.CHATT_AUDIO_POP_LOG = "1"
info = "Release server with audio pop diagnostics"

[action.audio-pop-alice]
sh = '''
rm -f /tmp/chatt-alice.kvlog /tmp/chatt-alice.json /tmp/chatt-alice-playback.wav
cargo run --release -p chatt -- --config dev/chatt-alice.toml --logfile /tmp/chatt-alice.kvlog
'''
require = ["audio-pop-server"]
managed = false
env.CHATT_RUN_DIR = "/tmp/chatt-dev/alice"
env.CHATT_AUDIO_POP_LOG = "1"
env.CHATT_AUDIO_PLAYBACK_WAV = "/tmp/chatt-alice-playback.wav"
info = "Run Alice in release mode with audio pop diagnostics"

[action.audio-pop-soundboard]
sh = '''
rm -f /tmp/chatt-soundboard.kvlog /tmp/chatt-soundboard.json /tmp/chatt-soundboard-playback.wav
cargo run --release -p chatt -- --config dev/chatt-soundboard.toml --logfile /tmp/chatt-soundboard.kvlog
'''
require = ["audio-pop-server"]
managed = false
env.CHATT_RUN_DIR = "/tmp/chatt-dev/soundboard"
env.CHATT_AUDIO_POP_LOG = "1"
env.CHATT_AUDIO_PLAYBACK_WAV = "/tmp/chatt-soundboard-playback.wav"
info = "Run the soundboard in release mode with audio pop diagnostics"


[action.client-soundboard]
sh = '''
rm /tmp/chatt-soundboard.json
rm /tmp/chatt-soundboard.kvlog
cargo run -p chatt -- --config dev/chatt-soundboard.toml --logfile /tmp/chatt-soundboard.kvlog
kvlog /tmp/chatt-soundboard.kvlog --json > /tmp/chatt-soundboard.json
'''
require = ["server"]
managed = false
env.CHATT_RUN_DIR = "/tmp/chatt-dev/soundboard"
info = "Run the Carol prerecorded-audio soundboard client in this terminal"

[action.bench]
pwd = "crates/benchmark"
sh = '''
set -e
echo "> cargo build --release -p benchmark"
BENCH=$(cargo --config "target.'cfg(unix)'.runner = 'echo'" run -q --release)
$BENCH bench --progress "$@"
'''
cli.forward_arguments = true
allow_multiple = true

[action.profile]
pwd = "crates/benchmark"
sh = '''
set -e
echo "> cargo build --release -p benchmark"
BENCH=$(cargo --config "target.'cfg(unix)'.runner = 'echo'" run -q --release)
ROUTE=${1:-profile}
PROFILE_ROUTE=$(printf '%s' "$ROUTE" | sed 's#[^A-Za-z0-9_.-]#-#g')
PROFILE_OUTPUT="/tmp/profile-${PROFILE_ROUTE}.json"
samply record -r 5000 --save-only --output "$PROFILE_OUTPUT" $BENCH profile  "$@" || exit 1
echo "Profile output to $PROFILE_OUTPUT for: benchmark profile $*"
'''
env.DEBUGINFOD_URLS = "https://debuginfod.archlinux.org"
env.SAMPLY_USE_DEBUGINFOD = "1"
cli.forward_arguments = true
allow_multiple = true

[group]
clients = ["client-alice", "client-bob", "client-soundboard"]
audio-pop = ["audio-pop-alice", "audio-pop-soundboard"]
