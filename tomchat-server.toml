# Default tomchat server configuration. Server configuration is loaded from
# ./tomchat-server.toml unless --config or TOMCHAT_SERVER_CONFIG is provided.
#
# This file is development-oriented. Replace the identity seed, pairing codes,
# and tokens before using a server outside local testing.

[network]
tcp-addr = "127.0.0.1:41000"
udp-addr = "127.0.0.1:41001"
udp-probe-addr = "127.0.0.1:41002"
# Set to false to disable P2P candidate exchange and NAT probing. Voice still
# works through server-relayed UDP media.
p2p-enabled = true

[security]
# 32-byte Ed25519 seed encoded as hex. The client must pin the corresponding
# public key in network.server-public-key for non-development deployments.
server-identity-seed = "546f6d636861742064657620736572766572206b657920763100000000000001"

# Set to false for authenticated plaintext transport. Tokens, chat, files, and
# server-relayed media are then sent without confidentiality.
encryption = true

# Keep this at zero when the server should relay messages without retaining
# message bodies for future joins.
chat-history-limit = 0
max-file-size-bytes = 52428800

