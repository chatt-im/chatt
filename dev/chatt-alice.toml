[[servers]]
label = "local"
username = "Alice"
token = "alice-dev-token"
server-public-key = ""
tcp-addr = "127.0.0.1:41000"
udp-addr = "127.0.0.1:41000"

[ui]
placeholder = "Alice #lobby"
room-height = 4
max-composer-height = 6
max-messages = 50000
overscan = 24
default-bindings = "standard"
theme = "tomorrow-night"

[files]
receive-dir = "/tmp/chatt-alice"
max-upload-bytes = 52428800
max-receive-bytes = 52428800
upload-rate-bytes = 0

[p2p]
enabled = false
candidate-privacy = "mdns"
prefer-ipv6 = true

[history]
enabled = true

[web]
enabled = true
bind = "127.0.0.1:8080"
readonly = false
autoplay = "with-audio"
viewer-in-seperate-browser-tab = true

