[[servers]]
label = "local"
username = "Carol Soundboard"
token = "carol-dev-token"
server-public-key = ""
tcp-addr = "127.0.0.1:41000"
udp-addr = "127.0.0.1:41000"

[ui]
placeholder = "Soundboard: press 1 or type /sound 1"
room-height = 4
max-composer-height = 6
max-messages = 50000
overscan = 24
form-bindings = "vim"
theme = "tomorrow-night"

[files]
receive-dir = "/tmp/chatt-soundboard"
max-upload-bytes = 52428800
max-receive-bytes = 52428800

[audio]
bitrate-bps = 48000
echo-cancellation = false
denoise = "rnn-noise"
dred = "off"
max-amplification = 0.0
denoise-suppression = 1.0
denoise-release = 1.0
denoise-typing-suppression = false
denoise-typing-vad-enter = 0.800000011920929
denoise-typing-vad-release = 0.8199999928474426
input-buffer = "default"
output-buffer = "default"

[audio.latency]
capture-silence-gate = true
neteq-start-delay-ms = 60
neteq-min-delay-ms = 20
neteq-base-minimum-delay-ms = 0
neteq-max-delay-ms = 1000
hard-queue-bound-ms = 1500
initial-buffer-ms = 40
max-reorder-delay-ms = 60
device-period-margin-ms = 20
silence-vad-max = 64
capture-long-silence-stop-ms = 2000
capture-silence-preroll-ms = 30
capture-silence-ramp-ms = 10

[soundboard]
enabled = true
#\loss = "none"
loss = "random_60"
#loss = "congested_wifi"
seed = 8388357047376790533

[[soundboard.clips]]
name = "sample"
path = "assets/sample-001.opus"

# Clean 220 Hz sine (30 s) for isolating playback/time-scale crackle from
# mic/AGC/denoise factors. Press 2 (PlaySoundboard2) to send it.
[[soundboard.clips]]
name = "tone"
path = "/tmp/tone.wav"

[bindings.compose]
"1" = "PlaySoundboard1"
"2" = "PlaySoundboard2"
"3" = "PlaySoundboard3"
"4" = "PlaySoundboard4"
"5" = "PlaySoundboard5"
"6" = "PlaySoundboard6"
"7" = "PlaySoundboard7"
"8" = "PlaySoundboard8"
"9" = "PlaySoundboard9"

[bindings.log]
"1" = "PlaySoundboard1"
"2" = "PlaySoundboard2"
"3" = "PlaySoundboard3"
"4" = "PlaySoundboard4"
"5" = "PlaySoundboard5"
"6" = "PlaySoundboard6"
"7" = "PlaySoundboard7"
"8" = "PlaySoundboard8"
"9" = "PlaySoundboard9"
