# Default chatt configuration. User configuration is loaded from the platform
# config directory, e.g. ~/.config/chatt/client.toml on Linux, unless --config
# or CHATT_CONFIG is provided.

# Program (and fixed arguments) used to open a clicked chat URL. The URL is
# appended as the final argument. Defaults to the platform launcher: "open" on
# macOS, "xdg-open" on Linux.
# url-open = ["firefox", "--private-window"]

[audio]
bitrate-bps = 48000
# Noise suppression engine: "none", "spectral" (WebRTC), or "rnn-noise" (RNNoise).
denoise = "rnn-noise"
# DRED redundancy in outgoing voice: "off", "auto" (default), or "on". Auto and on are currently identical.
dred = "auto"
echo-cancellation = false
max-amplification = 12.0
# RNNoise tuning (rnn-noise engine only). 1.0 is stock; both default to off.
# denoise-suppression: over-suppression exponent (1.0..3.0), pushes down residual
#   noise like typing while preserving voice.
# denoise-release: per-frame gain-rise cap (1.0..0.15), stops noise swelling up
#   after a pause. Lower is stronger.
denoise-suppression = 1.0
denoise-release = 1.0
# Desk-mounted mic guard. When enabled with RNNoise, ducks loud low-VAD,
# low-derivative table/keyboard thumps after denoising.
denoise-typing-suppression = true
# Earshot VAD thresholds for the typing gate. Lower "enter" is less sensitive;
# higher "release" keeps suppression held until speech confidence is clearer.
denoise-typing-vad-enter = 0.80
denoise-typing-vad-release = 0.82
input-buffer = "default"
output-buffer = "default"
# Global output volume, mpv-style percent: 100 is unchanged, max is 130.
output-volume = 100

[audio.latency]
capture-silence-gate = true
neteq-start-delay-ms = 60
neteq-min-delay-ms = 20
neteq-max-delay-ms = 1000
hard-queue-bound-ms = 1500
initial-buffer-ms = 40
max-reorder-delay-ms = 60
device-period-margin-ms = 20
silence-vad-max = 64
capture-long-silence-stop-ms = 2000
capture-silence-preroll-ms = 30
capture-silence-ramp-ms = 10

[ui]
room-height = 4
max-composer-height = 6
composer-padding = true
max-messages = 50000
overscan = 24
default-bindings = "standard"
# Color theme: a builtin ("tomorrow-night", "base16-dark", "base16-light") or
# the name of a custom [ui.themes.<name>] table defined below.
theme = "tomorrow-night"

# Custom themes start from a builtin `base`, may define palette colors, and
# override individual style slots. Colors are "#rrggbb" / "#rgb" true-color,
# "ansi:N" (a 0-255 palette index), or a palette name in slot/syntax values.
# Each slot takes { fg = "...", bg = "..." } or dotted keys like text.fg; a
# bare string or integer is shorthand for the foreground. Defining a slot
# replaces it completely; omitted fg/bg components reset to terminal default.
# Select one with `theme = "midnight"`.
# [ui.themes.midnight]
# base = "tomorrow-night"
# palette.surface = "#101018"
# palette.sky = "#88ccff"
# background.bg = "surface"
# accent.fg = "sky"
# status-fill = { fg = "#cccccc", bg = "#202030" }
# scrollbar = { fg = "#cccccc", bg = "#202030" }
# [ui.themes.midnight.syntax]
# keyword = "#c792ea"

# download: how received files are handled — "off" rejects them, "memory" keeps
# them in a RAM ring buffer (lost on restart, viewable in the web log), and
# "persistent" saves them under download-dir (empty = platform default dir).
[files]
download = "memory"
download-dir = ""
# Size fields below are MiB (1024*1024 bytes).
download-memory-mb = 512
max-download-mb = 50
max-upload-mb = 4096

[p2p]
enabled = false
# How local host candidates are exposed to peers.
#   mdns     publish host candidates as random `.local` names resolved via mDNS (default)
#   disabled publish host candidates as literal IP addresses
#   no-host  suppress host candidates entirely, relying on reflexive and relay
candidate-privacy = "mdns"
# Prefer native IPv6 over IPv4 at equal candidate type (RFC 8421). Set false to
# revert to IPv4-first for diagnostics.
prefer-ipv6 = true

[history]
enabled = false

[web]
# Browser WebSocket origins default to the bound address and, for loopback or
# unspecified binds, localhost. A non-empty list replaces those defaults.
# allowed-origins = ["https://chat.example.test"]
# Automatically play newly received videos. `true` autoplays muted; use
# "with-audio" to request audio when the browser's autoplay policy allows it.
autoplay = false
# Where a clicked file preview opens: "panel" keeps the in-page side panel,
# "tab" opens each preview in its own browser tab.
viewer = "panel"

