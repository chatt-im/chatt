# Default chatt configuration. User configuration is loaded from
# ~/.config/chatt.toml unless --config or CHATT_CONFIG is provided.

[audio]
bitrate-bps = 48000
denoise = true
echo-cancellation = false
max-amplification = 12.0
buffer = "default"

[audio.latency]
adaptive-catch-up = true
capture-silence-gate = true
adaptive-target = true
target-queue-ms = 60
dynamic-target-floor-ms = 20
max-target-ms = 1000
hard-queue-bound-ms = 1500
initial-buffer-ms = 40
max-reorder-delay-ms = 60
device-period-margin-ms = 20
silence-vad-max = 64
capture-long-silence-stop-ms = 2000
capture-silence-preroll-ms = 30
capture-silence-ramp-ms = 10

[ui]
room-height = 4
max-composer-height = 6
placeholder = "Message #lobby"
max-messages = 50000
overscan = 24

[files]
max-upload-bytes = 52428800
max-receive-bytes = 52428800
receive-dir = "/tmp/tchat2"

[bindings.compose]
"C-c" = "Quit"
"F2" = "OpenSettings"
"ESC" = "EnterLog"
"ENTER" = "SubmitMessage"
"C-m" = "SubmitMessage"
"C-g" = "Cancel"
"C-v" = "ToggleMute"
"C-h" = "ToggleDeafen"

[bindings.log]
"C-c" = "Quit"
"i" = "EnterCompose"
"a" = "EnterCompose"
"F2" = "OpenSettings"
"q" = "EnterCompose"
"j" = "ScrollDown"
"k" = "ScrollUp"
"J" = "RoomScrollDown"
"K" = "RoomScrollUp"
"ENTER" = "OpenSelectedUserVolume"
"M" = "ToggleSelectedUserMute"
"DOWN" = "ScrollDown"
"UP" = "ScrollUp"
"C-d" = "HalfPageDown"
"C-u" = "HalfPageUp"
"G" = "Bottom"
"g g" = "Top"
"m" = "ToggleMute"
"h" = "ToggleDeafen"
"c" = "ClearChat"

[bindings.settings]
"C-c" = "Quit"
"ESC" = "Cancel"
"q" = "CloseSettings"
"F2" = "CloseSettings"
"j" = "FocusNext"
"k" = "FocusPrev"
"DOWN" = "SelectNext"
"UP" = "SelectPrev"
"C-j" = "SelectNext"
"C-k" = "SelectPrev"
"TAB" = "FocusNext"
"BACKTAB" = "FocusPrev"
"h" = "AdjustLeft"
"l" = "AdjustRight"
"C-l" = "AdjustRight"
"LEFT" = "AdjustLeft"
